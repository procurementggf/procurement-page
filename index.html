<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Struktur Organisasi</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    margin: 0;
    padding: 20px;
    text-align: center;
}

h1 {
    color: white;
}

/* DIREKTUR & MANAGER */

.top-section {
    background: white;
    margin: 20px 2cm;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
}

.top-card {
    display: flex;
    align-items: center;
    gap: 15px;
}

.top-card img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #2a5298;
}

.top-text {
    text-align: left;
}

.top-text h2 {
    margin: 0;
    font-size: 20px;
}

.top-text p {
    margin: 3px 0 0;
    font-size: 14px;
    color: gray;
}

/* CARD */

.card {
    display: inline-block;
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin: 10px;
    width: 150px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.card img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #2a5298;
}

.line {
    width: 2px;
    height: 40px;
    background: white;
    margin: auto;
}

.horizontal-line {
    width: 80%;
    height: 2px;
    background: white;
    margin: auto;
}

.row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

</style>

</head>

<body>

<h1>STRUKTUR ORGANISASI</h1>

<!-- DIREKTUR -->

<div class="top-section">

<div class="top-card">

<img src="Direktur.jpeg">

<div class="top-text">
<h2>AKSAL</h2>
<p>Direktur Utama</p>
</div>

</div>

</div>

<div class="line"></div>

<!-- MANAGER -->

<div class="top-section">

<div class="top-card">

<img src="Manager.jpeg">

<div class="top-text">
<h2>FRANK</h2>
<p>General Manager</p>
</div>

</div>

</div>

<div class="line"></div>

<!-- KEPALA BAGIAN -->

<div class="horizontal-line"></div>

<div class="row">

<div class="card">
<img src="Kabag1.jpeg">
<h3>Kepala Bagian 1</h3>
</div>

<div class="card">
<img src="Kabag2.jpeg">
<h3>Kepala Bagian 2</h3>
</div>

<div class="card">
<img src="Kabag3.jpeg">
<h3>Kepala Bagian 3</h3>
</div>

<div class="card">
<img src="Kabag4.jpeg">
<h3>Kepala Bagian 4</h3>
</div>

</div>

</body>
</html>
