<!DOCTYPE html>

<title>Struktur Organisasi</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    margin: 0;
    padding: 20px;
    text-align: center;
}

h1 {
    color: white;
}

/* CARD */

.card {
    display: inline-block;
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin: 10px;
    width: 150px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.card img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #2a5298;
}

.line {
    width: 2px;
    height: 40px;
    background: white;
    margin: auto;
}

.horizontal-line {
    width: 80%;
    height: 2px;
    background: white;
    margin: auto;
}

/* ROW */

.row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.section {
    margin-top: 20px;
}

</style>

</head>
