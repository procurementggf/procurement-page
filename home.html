<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home - Procurement Departement Portal</title>

<style>

/* Background utama profesional */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;

    /* Background gradient modern */
    background: linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );

    height: 100vh;
    color: white;
    text-align: center;
}

/* Tambahan efek cahaya transparan */
body::before {
    content: "";
    position: fixed;
    top: -100px;
    left: -100px;

    width: 500px;
    height: 500px;

    background: radial-gradient(
        circle,
        rgba(255,255,255,0.15),
        transparent 70%
    );

    z-index: 0;
}

/* Container utama */
.container {
    position: relative;
    z-index: 1;
    margin-top: 100px;
}

/* Judul besar */
.title {
    font-size: 40px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* Subtitle */
.subtitle {
    font-size: 18px;
    margin-bottom: 50px;
    opacity: 0.9;
}

/* Button modern */
.menu-button {
    background: linear-gradient(
        45deg,
        #00c6ff,
        #0072ff
    );

    color: white;
    padding: 15px 35px;
    margin: 15px;

    border: none;
    border-radius: 12px;

    font-size: 18px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;
}

/* Hover efek */
.menu-button:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Header */
.header {
    font-size: 30px;
    font-weight: bold;
    padding: 20px;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;

    padding: 12px;
    font-size: 14px;

    background: rgba(0,0,0,0.2);
}

.icon {
    width: 60px;   /* ukuran kecil */
    height: 60px;
    margin-right: 10px;
    object-fit: contain;
}

.menu-button {
    display: flex;
    align-items: center;
    justify-content: center;

    padding: 12px 25px;
    font-size: 18px;

}

/* Container untuk button */
.button-container {
    display: flex;
    justify-content: center; /* posisi tengah */
    align-items: center;

    gap: 25px; /* jarak antar button */

    margin-top: 40px;

    flex-wrap: wrap; /* kalau layar kecil turun ke bawah */
}

/* Supaya link tidak turun ke bawah */
.button-container a {
    text-decoration: none;
}

</style>

</head>

<body>

<!-- Header -->
<div class="header">
    DEPARTEMEN PROCUREMENT PORTAL
</div>

<!-- Isi -->
<div class="container">

<div class="title">
    Selamat Datang di Departemen Procurement
</div>

<div class="subtitle">
    Silakan pilih menu di bawah untuk melanjutkan
</div>

<div class="button-container">
<!-- Button 1 -->
<a href="index.html">
<button class="menu-button">

<img src="LOGO SO.jpg" class="icon">

Struktur Organisasi

</button>
</a>
<!-- Button 2 -->
<a href="https://app.powerbi.com/links/oImkGs1_Vb?ctid=6e94e51a-1adb-4f29-ab19-41c6ee86f706&pbi_source=linkShare">
<button class="menu-button">

<img src="DASHDASH1.png" class="icon">

Dashboard Monitoring PO

</button>
</a>

</div>

</div>

<!-- Footer -->
<div class="footer">
    © 2026 Procurement Dept | All Rights Reserved
</div>

</body>
</html>
